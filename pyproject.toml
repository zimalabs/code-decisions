[project]
name = "engram-dev"
requires-python = ">=3.11"
version = "0.0.0"

[dependency-groups]
dev = ["pytest", "pytest-cov", "ruff", "mypy"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["plugin"]
addopts = "--cov=engram --cov-report=term-missing --cov-report=xml"

[tool.coverage.run]
source = ["engram"]

[tool.coverage.report]
show_missing = true
skip_empty = true

[tool.ruff]
target-version = "py311"
src = ["plugin"]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["SIM102", "SIM105", "SIM108", "SIM110"]

[tool.mypy]
python_version = "3.11"
mypy_path = "plugin"
packages = ["engram"]
warn_return_any = true
warn_unused_configs = true
